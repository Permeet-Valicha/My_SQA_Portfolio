<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS QA Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Terminal Side */
        .terminal {
            width: 40%;
            background-color: #020617;
            border-right: 1px solid #334155;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            position: relative;
        }
        
        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background-color: #ef4444; }
        .dot.yellow { background-color: #eab308; }
        .dot.green { background-color: #22c55e; }

        .log-container {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            opacity: 0;
            animation: fadeIn 0.2s forwards;
            margin-bottom: 8px;
        }

        .text-info { color: #38bdf8; }
        .text-success { color: #4ade80; }
        .text-warning { color: #facc15; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Browser Side */
        .browser {
            width: 60%;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .browser-header {
            background-color: #cbd5e1;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .address-bar {
            background-color: #ffffff;
            border-radius: 4px;
            flex: 1;
            height: 24px;
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            padding-left: 10px;
        }

        .browser-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* HRMS Mock UI */
        .hrms-ui {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            flex: 1;
            display: flex;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .sidebar {
            width: 200px;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            background: #334155;
            font-size: 14px;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .sidebar-item.active {
            background: #3b82f6;
            opacity: 1;
        }

        .main-panel {
            flex: 1;
            padding: 30px;
        }

        .skeleton-title {
            width: 150px;
            height: 24px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .skeleton-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        /* Highlight box for test focus */
        .test-focus {
            position: absolute;
            border: 2px solid #ef4444;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 10;
        }

        .test-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>');
            background-size: contain;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: top 0.5s ease, left 0.5s ease;
        }

        /* Success Overlay */
        .success-overlay {
            position: absolute;
            inset: 0;
            background: rgba(34, 197, 94, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 30;
            backdrop-filter: blur(2px);
        }

        .success-badge {
            background: #22c55e;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.5);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-overlay.show {
            opacity: 1;
        }
        .success-overlay.show .success-badge {
            transform: scale(1);
        }

    </style>
</head>
<body>

    <!-- Terminal Emulation -->
    <div class="terminal">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="logs" class="log-container">
            <!-- Logs will be injected here -->
        </div>
    </div>

    <!-- Browser Emulation -->
    <div class="browser">
        <div class="browser-header">
            <div class="dot red" style="background:#ef4444"></div>
            <div class="dot yellow" style="background:#eab308"></div>
            <div class="dot green" style="background:#22c55e"></div>
            <div class="address-bar" id="address-bar">about:blank</div>
        </div>
        
        <div class="browser-content">
            <div class="test-cursor" id="cursor"></div>
            <div class="test-focus" id="focus-box"></div>
            
            <!-- HRMS App UI -->
            <div class="hrms-ui" id="hrms-app">
                <div class="sidebar">
                    <div style="font-size: 20px; font-weight: bold; margin-bottom: 40px;">HRMS.io</div>
                    <div class="sidebar-item active" id="nav-dash">Dashboard</div>
                    <div class="sidebar-item" id="nav-emp">Employees</div>
                    <div class="sidebar-item" id="nav-pay">Payroll</div>
                    <div class="sidebar-item" id="nav-role">Roles/Auth</div>
                </div>
                <div class="main-panel">
                    <div class="skeleton-title" id="page-title"></div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="skeleton-card h-24" id="card-1">
                            <div class="h-4 w-1/2 bg-slate-200 rounded mb-2"></div>
                            <div class="h-8 w-1/3 bg-slate-300 rounded"></div>
                        </div>
                        <div class="skeleton-card h-24" id="card-2">
                            <div class="h-4 w-1/2 bg-slate-200 rounded mb-2"></div>
                            <div class="h-8 w-1/3 bg-slate-300 rounded"></div>
                        </div>
                    </div>
                    
                    <div class="skeleton-card h-48" id="card-main">
                        <div class="h-4 w-1/3 bg-slate-200 rounded mb-6"></div>
                        <div class="space-y-3">
                            <div class="h-4 w-full bg-slate-100 rounded"></div>
                            <div class="h-4 w-full bg-slate-100 rounded"></div>
                            <div class="h-4 w-3/4 bg-slate-100 rounded"></div>
                            <div class="h-4 w-5/6 bg-slate-100 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="success-overlay" id="success-screen">
                <div class="success-badge">✔ ALL TESTS PASSED</div>
            </div>
        </div>
    </div>

    <script>
        const logsContainer = document.getElementById('logs');
        const addressBar = document.getElementById('address-bar');
        const hrmsApp = document.getElementById('hrms-app');
        const cursor = document.getElementById('cursor');
        const focusBox = document.getElementById('focus-box');
        
        const delay = ms => new Promise(res => setTimeout(res, ms));

        function log(msg, type = '') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.innerHTML = `> ${msg}`;
            logsContainer.appendChild(line);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function moveCursorTo(elId) {
            const el = document.getElementById(elId);
            if(!el) return;
            const rect = el.getBoundingClientRect();
            cursor.style.opacity = 1;
            // Move relative to browser content
            const browserRect = document.querySelector('.browser-content').getBoundingClientRect();
            cursor.style.top = (rect.top - browserRect.top + rect.height/2) + 'px';
            cursor.style.left = (rect.left - browserRect.left + rect.width/2) + 'px';
        }

        function highlightBox(elId) {
            const el = document.getElementById(elId);
            if(!el) {
                focusBox.style.opacity = 0;
                return;
            }
            const rect = el.getBoundingClientRect();
            const browserRect = document.querySelector('.browser-content').getBoundingClientRect();
            focusBox.style.top = (rect.top - browserRect.top - 5) + 'px';
            focusBox.style.left = (rect.left - browserRect.left - 5) + 'px';
            focusBox.style.width = (rect.width + 10) + 'px';
            focusBox.style.height = (rect.height + 10) + 'px';
            focusBox.style.opacity = 1;
        }

        function changeTab(id) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function runAutomation() {
            // Reset
            logsContainer.innerHTML = '';
            hrmsApp.style.opacity = 0;
            document.getElementById('success-screen').classList.remove('show');
            cursor.style.opacity = 0;
            focusBox.style.opacity = 0;

            await delay(1000);
            log('Initializing Selenium WebDriver...', 'text-info');
            await delay(800);
            log('Loading Staging Environment...', 'text-info');
            
            addressBar.innerText = 'https://staging.hrms-enterprise.io/login';
            await delay(800);
            
            log('Performing Login: Admin Role...', 'text-warning');
            addressBar.innerText = 'https://staging.hrms-enterprise.io/dashboard';
            hrmsApp.style.opacity = 1;
            await delay(1000);
            log('Login Successful [200 OK]', 'text-success');

            // Test 1: Employee Data
            log('Navigating to Employee Directory...', 'text-info');
            moveCursorTo('nav-emp');
            await delay(600);
            changeTab('nav-emp');
            highlightBox('card-main');
            await delay(800);
            log('Validating Data Integrity for 500+ records...', 'text-warning');
            await delay(1000);
            log('Assertion Passed: Employee records match DB state.', 'text-success');

            // Test 2: Role Based Access
            log('Testing Role-Based Access Controls...', 'text-info');
            moveCursorTo('nav-role');
            await delay(600);
            changeTab('nav-role');
            highlightBox('card-1');
            await delay(800);
            log('Injecting unprivileged token...', 'text-warning');
            await delay(1000);
            log('Assertion Passed: 403 Forbidden correctly triggered.', 'text-success');

            // Test 3: Payroll Calculations
            log('Executing Payroll E2E Logic...', 'text-info');
            moveCursorTo('nav-pay');
            await delay(600);
            changeTab('nav-pay');
            highlightBox('card-2');
            await delay(800);
            log('Cross-referencing calculation outputs...', 'text-warning');
            await delay(1200);
            log('Assertion Passed: Tax brackets validated.', 'text-success');

            // Finish
            cursor.style.opacity = 0;
            focusBox.style.opacity = 0;
            await delay(500);
            log('-----------------------------------');
            log('Test Suite "HRMS Core Regression" Finished.', 'text-info');
            log('Total Tests: 42 | Passed: 42 | Failed: 0', 'text-success');
            
            document.getElementById('success-screen').classList.add('show');
            
            // Loop after a delay
            await delay(5000);
            runAutomation();
        }

        // Start animation loop
        runAutomation();
    </script>
</body>
</html>
