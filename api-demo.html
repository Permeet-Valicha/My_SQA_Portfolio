<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API QA Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Terminal Side (Newman CLI) */
        .terminal {
            width: 45%;
            background-color: #020617;
            border-right: 1px solid #334155;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            position: relative;
        }
        
        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background-color: #ef4444; }
        .dot.yellow { background-color: #eab308; }
        .dot.green { background-color: #22c55e; }

        .log-container {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            opacity: 0;
            animation: fadeIn 0.2s forwards;
            margin-bottom: 6px;
        }

        .text-newman { color: #ff6c37; font-weight: bold; }
        .text-method { color: #facc15; font-weight: bold; }
        .text-info { color: #cbd5e1; }
        .text-success { color: #4ade80; }
        .text-url { color: #38bdf8; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Postman-like UI Side */
        .postman-ui {
            width: 55%;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .postman-header {
            background-color: #0f172a;
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            border-bottom: 1px solid #334155;
        }

        .req-bar {
            background-color: #334155;
            border-radius: 4px;
            flex: 1;
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .req-method {
            font-weight: bold;
        }
        .req-method.post { color: #facc15; }
        .req-method.get { color: #4ade80; }

        .postman-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s;
        }

        .panel.show {
            opacity: 1;
            transform: translateY(0);
        }

        .panel-header {
            background: #1e293b;
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
        }

        .status-badge {
            font-family: 'Fira Code', monospace;
        }
        .status-badge.s200 { color: #4ade80; }
        .status-badge.s400 { color: #f87171; }

        .code-block {
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #e2e8f0;
            overflow-y: auto;
            flex: 1;
        }

        .json-key { color: #38bdf8; }
        .json-string { color: #a3e635; }
        .json-number { color: #facc15; }

        /* Success Overlay */
        .success-overlay {
            position: absolute;
            inset: 0;
            background: rgba(34, 197, 94, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 200;
            backdrop-filter: blur(2px);
        }

        .success-badge {
            background: #ff6c37;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 25px -5px rgba(255, 108, 55, 0.5);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .success-overlay.show {
            opacity: 1;
        }
        .success-overlay.show .success-badge {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <!-- Terminal Emulation (Newman) -->
    <div class="terminal">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="logs" class="log-container">
            <!-- Logs will be injected here -->
        </div>
    </div>

    <!-- Postman Emulation -->
    <div class="postman-ui">
        <div class="postman-header">
            <div style="font-weight: 800; color: #ff6c37; font-size: 18px;">API Tests</div>
            <div class="req-bar" id="req-bar">
                <span class="req-method post" id="req-method">POST</span>
                <span class="text-info" id="req-url">{{baseUrl}}/api/v1/auth/login</span>
            </div>
        </div>
        
        <div class="postman-content">
            <div class="panel" id="req-panel">
                <div class="panel-header">REQUEST BODY</div>
                <div class="code-block" id="req-body">
{
  <span class="json-key">"email"</span>: <span class="json-string">"admin@test.io"</span>,
  <span class="json-key">"password"</span>: <span class="json-string">"secure123!"</span>
}
                </div>
            </div>

            <div class="panel" id="res-panel">
                <div class="panel-header">
                    <span>RESPONSE</span>
                    <span class="status-badge s200" id="res-status">200 OK</span>
                </div>
                <div class="code-block" id="res-body">
{
  <span class="json-key">"status"</span>: <span class="json-string">"success"</span>,
  <span class="json-key">"token"</span>: <span class="json-string">"eyJhbGciOiJIUzI1NiIsInR5..."</span>
}
                </div>
            </div>
            
            <div class="success-overlay" id="success-screen">
                <div class="success-badge">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    NEWMAN RUN COMPLETED
                </div>
            </div>
        </div>
    </div>

    <script>
        const logsContainer = document.getElementById('logs');
        const reqBar = document.getElementById('req-bar');
        const reqMethod = document.getElementById('req-method');
        const reqUrl = document.getElementById('req-url');
        const reqPanel = document.getElementById('req-panel');
        const resPanel = document.getElementById('res-panel');
        const reqBody = document.getElementById('req-body');
        const resBody = document.getElementById('res-body');
        const resStatus = document.getElementById('res-status');
        
        const delay = ms => new Promise(res => setTimeout(res, ms));

        function log(msg, type = '') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.innerHTML = msg;
            logsContainer.appendChild(line);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        async function updateUI(method, url, rBody, sCode, sText, rstBody) {
            reqPanel.classList.remove('show');
            resPanel.classList.remove('show');
            reqBar.style.opacity = 0;
            
            await delay(400);
            
            reqMethod.className = `req-method ${method.toLowerCase()}`;
            reqMethod.innerText = method;
            reqUrl.innerText = url;
            
            reqBody.innerHTML = rBody;
            
            resStatus.className = `status-badge s${sCode}`;
            resStatus.innerText = `${sCode} ${sText}`;
            resBody.innerHTML = rstBody;
            
            reqBar.style.opacity = 1;
            reqPanel.classList.add('show');
            await delay(800);
            resPanel.classList.add('show');
        }

        async function runAutomation() {
            // Reset
            logsContainer.innerHTML = '';
            document.getElementById('success-screen').classList.remove('show');
            
            await delay(1000);
            log('> Pipeline Triggered: API Regression', 'text-info');
            await delay(500);
            log('> newman run ecommerce_api.postman_collection.json -e staging.json', 'text-info');
            await delay(800);
            
            log('<br><span class="text-newman">Newman v5.3.1</span>');
            log('------------------------------------------------------------');

            // API 1: Auth Login
            log('↳ Auth Flow / Login User');
            log('  <span class="text-method">POST</span> <span class="text-url">https://api.shop.io/v1/auth/login</span> [200 OK, 120ms]');
            
            await updateUI(
                'POST', '{{baseUrl}}/v1/auth/login',
                `{\n  <span class="json-key">"email"</span>: <span class="json-string">"qa@shop.io"</span>,\n  <span class="json-key">"password"</span>: <span class="json-string">"testPass123"</span>\n}`,
                '200', 'OK',
                `{\n  <span class="json-key">"token"</span>: <span class="json-string">"eyJhbGciOiJIUz..."</span>,\n  <span class="json-key">"expiresIn"</span>: <span class="json-number">3600</span>\n}`
            );
            
            await delay(500);
            log('  <span class="text-success">✔</span> Status code is 200');
            log('  <span class="text-success">✔</span> Token is generated and string');
            await delay(1000);

            // API 2: Create Order (Valid)
            log('<br>↳ Order Management / Create Order');
            log('  <span class="text-method">POST</span> <span class="text-url">https://api.shop.io/v1/orders</span> [201 Created, 210ms]');
            
            await updateUI(
                'POST', '{{baseUrl}}/v1/orders',
                `{\n  <span class="json-key">"items"</span>: [\n    {<span class="json-key">"productId"</span>: <span class="json-number">102</span>, <span class="json-key">"qty"</span>: <span class="json-number">2</span>}\n  ]\n}`,
                '201', 'Created',
                `{\n  <span class="json-key">"orderId"</span>: <span class="json-string">"ORD-98234"</span>,\n  <span class="json-key">"status"</span>: <span class="json-string">"PENDING"</span>\n}`
            );

            await delay(500);
            log('  <span class="text-success">✔</span> Status code is 201');
            log('  <span class="text-success">✔</span> Schema validates against Order JSON schema');
            await delay(1000);

            // API 3: Create Order (Invalid Data)
            log('<br>↳ Order Management / Create Order (Negative)');
            log('  <span class="text-method">POST</span> <span class="text-url">https://api.shop.io/v1/orders</span> [400 Bad Request, 85ms]');
            
            await updateUI(
                'POST', '{{baseUrl}}/v1/orders',
                `{\n  <span class="json-key">"items"</span>: []\n}`,
                '400', 'Bad Request',
                `{\n  <span class="json-key">"error"</span>: <span class="json-string">"VALIDATION_FAILED"</span>,\n  <span class="json-key">"message"</span>: <span class="json-string">"Items array cannot be empty."</span>\n}`
            );

            await delay(500);
            log('  <span class="text-success">✔</span> Status code is 400');
            log('  <span class="text-success">✔</span> Error message matches expected format');
            await delay(1500);

            // Newman Summary
            log('<br>------------------------------------------------------------');
            log('┌─────────────────────────┬──────────┬──────────┐', 'text-info');
            log('│                         │ executed │   failed │', 'text-info');
            log('├─────────────────────────┼──────────┼──────────┤', 'text-info');
            log('│              iterations │        1 │        0 │', 'text-info');
            log('│                requests │       45 │        0 │', 'text-info');
            log('│            test-scripts │       90 │        0 │', 'text-info');
            log('│      prerequisite-scrip │       45 │        0 │', 'text-info');
            log('│              assertions │      135 │        0 │', 'text-success');
            log('└─────────────────────────┴──────────┴──────────┘', 'text-info');
            log('<br>Total run duration: 12.4s', 'text-info');
            
            await delay(800);
            document.getElementById('success-screen').classList.add('show');
            
            // Loop after a delay
            await delay(5000);
            runAutomation();
        }

        // Start animation loop
        runAutomation();
    </script>
</body>
</html>
