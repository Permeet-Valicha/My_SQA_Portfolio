<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce QA Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Terminal Side */
        .terminal {
            width: 40%;
            background-color: #020617;
            border-right: 1px solid #334155;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            position: relative;
        }
        
        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background-color: #ef4444; }
        .dot.yellow { background-color: #eab308; }
        .dot.green { background-color: #22c55e; }

        .log-container {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            opacity: 0;
            animation: fadeIn 0.2s forwards;
            margin-bottom: 8px;
        }

        .text-info { color: #38bdf8; }
        .text-success { color: #4ade80; }
        .text-warning { color: #facc15; }
        .text-error { color: #ef4444; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Browser Side */
        .browser {
            width: 60%;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .browser-header {
            background-color: #cbd5e1;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .address-bar {
            background-color: #ffffff;
            border-radius: 4px;
            flex: 1;
            height: 24px;
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            padding-left: 10px;
        }

        .browser-content {
            flex: 1;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Store Header */
        .store-header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .cart-icon {
            position: relative;
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 2px solid transparent;
        }
        
        .cart-badge {
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-badge.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Store Content */
        .store-main {
            padding: 30px;
            flex: 1;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .product-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        .product-img {
            height: 120px;
            background: #f8fafc;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .add-to-cart-btn {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
            border: 2px solid transparent;
        }

        /* Checkout Overlay */
        .checkout-modal {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .checkout-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .checkout-form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .checkout-modal.show .checkout-form {
            transform: translateY(0);
        }

        .form-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            margin-top: 5px;
            font-size: 14px;
            color: #334155;
            background: #f8fafc;
        }

        .pay-btn {
            background: #22c55e;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            margin-top: 20px;
            border: 2px solid transparent;
        }

        /* Test Focus and Cursor */
        .test-focus {
            position: absolute;
            border: 2px solid #ef4444;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .test-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>');
            background-size: contain;
            pointer-events: none;
            z-index: 110;
            opacity: 0;
            transition: top 0.4s ease-out, left 0.4s ease-out;
        }

        /* Success Overlay */
        .success-overlay {
            position: absolute;
            inset: 0;
            background: rgba(34, 197, 94, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 200;
            backdrop-filter: blur(2px);
        }

        .success-badge {
            background: #22c55e;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.5);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-overlay.show {
            opacity: 1;
        }
        .success-overlay.show .success-badge {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <!-- Terminal Emulation -->
    <div class="terminal">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="logs" class="log-container">
            <!-- Logs will be injected here -->
        </div>
    </div>

    <!-- Browser Emulation -->
    <div class="browser">
        <div class="browser-header">
            <div class="dot red" style="background:#ef4444"></div>
            <div class="dot yellow" style="background:#eab308"></div>
            <div class="dot green" style="background:#22c55e"></div>
            <div class="address-bar" id="address-bar">about:blank</div>
        </div>
        
        <div class="browser-content" id="browser-content">
            <div class="test-cursor" id="cursor"></div>
            <div class="test-focus" id="focus-box"></div>
            
            <div class="store-header" id="store-header">
                <div style="font-size: 20px; font-weight: 800; color: #0f172a;">Shop.io</div>
                <div class="cart-icon" id="cart-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Cart
                    <span class="cart-badge" id="cart-badge">1</span>
                </div>
            </div>

            <div class="store-main" id="store-main">
                <div class="product-grid">
                    <div class="product-card">
                        <div class="product-img"></div>
                        <div style="height: 14px; background: #cbd5e1; width: 80%; border-radius: 4px;"></div>
                        <div style="height: 14px; background: #e2e8f0; width: 40%; margin-top: 8px; border-radius: 4px;"></div>
                        <div class="add-to-cart-btn" id="add-to-cart-1">Add to Cart</div>
                    </div>
                    <div class="product-card">
                        <div class="product-img"></div>
                        <div style="height: 14px; background: #cbd5e1; width: 70%; border-radius: 4px;"></div>
                        <div style="height: 14px; background: #e2e8f0; width: 50%; margin-top: 8px; border-radius: 4px;"></div>
                        <div class="add-to-cart-btn" id="add-to-cart-2">Add to Cart</div>
                    </div>
                </div>
            </div>

            <!-- Checkout Modal -->
            <div class="checkout-modal" id="checkout-modal">
                <div class="checkout-form" id="checkout-form">
                    <div style="font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #0f172a;">Secure Checkout</div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 12px; font-weight: 600; color: #64748b;">Card Number</label>
                        <div class="form-input" id="cc-number">**** **** **** ****</div>
                    </div>
                    
                    <div style="display: flex; gap: 15px;">
                        <div style="flex: 1;">
                            <label style="font-size: 12px; font-weight: 600; color: #64748b;">Expiry</label>
                            <div class="form-input" id="cc-exp">MM/YY</div>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 12px; font-weight: 600; color: #64748b;">CVV</label>
                            <div class="form-input" id="cc-cvv">***</div>
                        </div>
                    </div>

                    <div class="pay-btn" id="pay-btn">Pay $99.00</div>
                </div>
            </div>

            <div class="success-overlay" id="success-screen">
                <div class="success-badge">✔ REGRESSION SUITE PASSED</div>
            </div>
        </div>
    </div>

    <script>
        const logsContainer = document.getElementById('logs');
        const addressBar = document.getElementById('address-bar');
        const cursor = document.getElementById('cursor');
        const focusBox = document.getElementById('focus-box');
        
        const delay = ms => new Promise(res => setTimeout(res, ms));

        function log(msg, type = '') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.innerHTML = `> ${msg}`;
            logsContainer.appendChild(line);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function moveCursorTo(elId) {
            const el = document.getElementById(elId);
            if(!el) return;
            const rect = el.getBoundingClientRect();
            cursor.style.opacity = 1;
            const browserRect = document.getElementById('browser-content').getBoundingClientRect();
            cursor.style.top = (rect.top - browserRect.top + rect.height/2) + 'px';
            cursor.style.left = (rect.left - browserRect.left + rect.width/2) + 'px';
        }

        function highlightBox(elId) {
            const el = document.getElementById(elId);
            if(!el) {
                focusBox.style.opacity = 0;
                return;
            }
            const rect = el.getBoundingClientRect();
            const browserRect = document.getElementById('browser-content').getBoundingClientRect();
            focusBox.style.top = (rect.top - browserRect.top - 5) + 'px';
            focusBox.style.left = (rect.left - browserRect.left - 5) + 'px';
            focusBox.style.width = (rect.width + 10) + 'px';
            focusBox.style.height = (rect.height + 10) + 'px';
            focusBox.style.opacity = 1;
        }

        function typeText(elId, text) {
            const el = document.getElementById(elId);
            if(!el) return;
            el.innerText = text;
            el.style.color = '#0f172a';
            el.style.borderColor = '#3b82f6';
        }

        async function runAutomation() {
            // Reset state
            logsContainer.innerHTML = '';
            document.getElementById('store-header').style.opacity = 0;
            document.getElementById('store-main').style.opacity = 0;
            document.getElementById('cart-badge').classList.remove('show');
            document.getElementById('checkout-modal').classList.remove('show');
            document.getElementById('success-screen').classList.remove('show');
            document.getElementById('cc-number').innerText = '**** **** **** ****';
            document.getElementById('cc-exp').innerText = 'MM/YY';
            document.getElementById('cc-cvv').innerText = '***';
            document.getElementById('cc-number').style.borderColor = '#cbd5e1';
            document.getElementById('cc-exp').style.borderColor = '#cbd5e1';
            document.getElementById('cc-cvv').style.borderColor = '#cbd5e1';
            document.getElementById('pay-btn').style.background = '#22c55e';
            document.getElementById('pay-btn').innerText = 'Pay $99.00';
            cursor.style.opacity = 0;
            focusBox.style.opacity = 0;

            await delay(1000);
            log('Initializing Web Driver...', 'text-info');
            await delay(800);
            log('Navigating to https://shop.io...', 'text-info');
            
            addressBar.innerText = 'https://shop.io/';
            document.getElementById('store-header').style.opacity = 1;
            document.getElementById('store-main').style.opacity = 1;
            await delay(1000);
            
            // Test 1: Add to Cart Logic
            log('Testing Cart Logic...', 'text-warning');
            moveCursorTo('add-to-cart-1');
            await delay(600);
            highlightBox('add-to-cart-1');
            await delay(400);
            document.getElementById('add-to-cart-1').style.background = '#1e293b';
            document.getElementById('cart-badge').classList.add('show');
            await delay(600);
            document.getElementById('add-to-cart-1').style.background = '#0f172a';
            log('Assertion Passed: Item added, cart state updated.', 'text-success');

            // Test 2: Checkout Initiation
            await delay(800);
            log('Initiating Checkout Flow...', 'text-info');
            moveCursorTo('cart-icon');
            await delay(600);
            highlightBox('cart-icon');
            await delay(400);
            addressBar.innerText = 'https://shop.io/checkout';
            document.getElementById('checkout-modal').classList.add('show');
            await delay(1000);

            // Test 3: Payment Gateway Validation
            log('Testing Payment Gateway Integrations...', 'text-warning');
            
            // Invalid Test
            moveCursorTo('cc-number');
            await delay(500);
            highlightBox('cc-number');
            typeText('cc-number', '4111 1111 1111 0000'); // Fake invalid
            await delay(400);
            moveCursorTo('pay-btn');
            await delay(400);
            highlightBox('pay-btn');
            document.getElementById('pay-btn').style.background = '#16a34a';
            await delay(300);
            document.getElementById('pay-btn').style.background = '#22c55e';
            log('Simulating Payment Processing...', 'text-info');
            await delay(800);
            log('Assertion Passed: Gateway rejected invalid card.', 'text-success');

            // Valid Test
            await delay(800);
            log('Injecting Valid Test Card Data...', 'text-warning');
            moveCursorTo('cc-number');
            await delay(400);
            highlightBox('cc-number');
            typeText('cc-number', '4242 4242 4242 4242'); // Stripe test card
            
            moveCursorTo('cc-exp');
            await delay(400);
            highlightBox('cc-exp');
            typeText('cc-exp', '12/28');
            
            moveCursorTo('cc-cvv');
            await delay(400);
            highlightBox('cc-cvv');
            typeText('cc-cvv', '123');

            await delay(600);
            moveCursorTo('pay-btn');
            await delay(500);
            highlightBox('pay-btn');
            document.getElementById('pay-btn').style.background = '#16a34a';
            document.getElementById('pay-btn').innerText = 'Processing...';
            await delay(1000);
            
            log('Asserting Order State Machine transition...', 'text-warning');
            await delay(800);
            document.getElementById('pay-btn').innerText = 'Success!';
            log('Assertion Passed: Order Status -> CONFIRMED', 'text-success');

            // Finish
            cursor.style.opacity = 0;
            focusBox.style.opacity = 0;
            await delay(500);
            log('-----------------------------------');
            log('Test Suite "Checkout Regression" Finished.', 'text-info');
            log('Total Tests: 28 | Revenue Leakage Detected: 0', 'text-success');
            
            document.getElementById('success-screen').classList.add('show');
            
            // Loop after a delay
            await delay(5000);
            runAutomation();
        }

        // Start animation loop
        runAutomation();
    </script>
</body>
</html>
